# 生产环境安全配置

## 安全策略版本
version: "1.0.0"
last_updated: "2026-03-06"

## 认证配置
authentication:
  enabled: true
  method: "jwt"  # jwt | oauth2 | api_key
  
  jwt:
    secret_key: "${JWT_SECRET_KEY}"  # 从环境变量读取
    algorithm: "HS256"
    expiration: 3600  # 1小时
    refresh_expiration: 86400  # 24小时
    
  oauth2:
    provider: "github"  # github | google | custom
    client_id: "${OAUTH_CLIENT_ID}"
    client_secret: "${OAUTH_CLIENT_SECRET}"
    redirect_uri: "https://your-domain.com/callback"
    
  api_key:
    header_name: "X-API-Key"
    keys:
      - name: "production"
        key: "${API_KEY_PROD}"
        permissions: ["read", "write"]
      - name: "monitoring"
        key: "${API_KEY_MONITORING}"
        permissions: ["read"]

## 网络安全
network:
  # TLS配置
  tls:
    enabled: true
    version: "1.3"  # 1.2 | 1.3
    cert_file: "/etc/ssl/certs/vehicle-sim.crt"
    key_file: "/etc/ssl/private/vehicle-sim.key"
    ca_file: "/etc/ssl/certs/ca-bundle.crt"
    cipher_suites:
      - "TLS_AES_256_GCM_SHA384"
      - "TLS_CHACHA20_POLY1305_SHA256"
      - "TLS_AES_128_GCM_SHA256"
    
  # 防火墙配置
  firewall:
    enabled: true
    default_policy: "DROP"
    
    # 允许的入站端口
    inbound_rules:
      - port: 443
        protocol: "HTTPS"
        source: "0.0.0.0/0"
        description: "HTTPS access"
        
      - port: 9090
        protocol: "TCP"
        source: "10.0.0.0/8"  # 仅内网
        description: "Prometheus metrics"
        
      - port: 22
        protocol: "TCP"
        source: "10.0.0.0/8"  # 仅内网SSH
        description: "SSH access"
    
    # 允许的出站连接
    outbound_rules:
      - port: 443
        protocol: "HTTPS"
        destination: "0.0.0.0/0"
        
      - port: 53
        protocol: "UDP"
        destination: "10.0.0.0/8"
        description: "DNS"

## 访问控制
access_control:
  # RBAC配置
  rbac:
    enabled: true
    
    roles:
      - name: "admin"
        permissions:
          - "system:read"
          - "system:write"
          - "simulation:read"
          - "simulation:write"
          - "config:read"
          - "config:write"
          
      - name: "operator"
        permissions:
          - "simulation:read"
          - "simulation:write"
          - "config:read"
          
      - name: "viewer"
        permissions:
          - "simulation:read"
          - "config:read"
    
    # 用户角色映射
    user_roles:
      - username: "admin@company.com"
        roles: ["admin"]
      - username: "operator@company.com"
        roles: ["operator"]
  
  # IP白名单
  ip_whitelist:
    enabled: true
    allowed_ips:
      - "10.0.0.0/8"      # 内网
      - "192.168.1.0/24"  # 办公网络
      - "203.0.113.0/24"  # 合作伙伴

## 数据安全
data_security:
  # 加密配置
  encryption:
    enabled: true
    algorithm: "AES-256-GCM"
    key_rotation_days: 90
    
    # 敏感数据加密
    sensitive_fields:
      - "password"
      - "api_key"
      - "secret_key"
      - "token"
  
  # 数据脱敏
  data_masking:
    enabled: true
    rules:
      - field: "email"
        pattern: "^([^@]{3})[^@]*(@.*)$"
        replacement: "$1***$2"
        
      - field: "phone"
        pattern: "^(\\d{3})\\d{4}(\\d{4})$"
        replacement: "$1****$2"

## 审计日志
audit:
  enabled: true
  log_file: "/var/log/vehicle-sim/audit.log"
  max_size_mb: 100
  retention_days: 90
  
  # 审计事件
  events:
    - "authentication_success"
    - "authentication_failure"
    - "authorization_failure"
    - "config_change"
    - "simulation_start"
    - "simulation_stop"
    - "data_access"
    - "data_modification"
    - "system_shutdown"
  
  # 敏感操作审计
  sensitive_operations:
    - operation: "DELETE /api/v1/simulation/*"
      always_log: true
      
    - operation: "POST /api/v1/config/*"
      always_log: true
      
    - operation: "PUT /api/v1/users/*"
      always_log: true

## 速率限制
rate_limiting:
  enabled: true
  
  # 全局限制
  global:
    requests_per_second: 1000
    burst: 100
    
  # 按用户限制
  per_user:
    requests_per_minute: 100
    requests_per_hour: 1000
    
  # 按IP限制
  per_ip:
    requests_per_minute: 200
    
  # 特定端点限制
  endpoints:
    - path: "/api/v1/simulation/start"
      limit: 10
      window: "minute"
      
    - path: "/api/v1/auth/login"
      limit: 5
      window: "minute"

## 输入验证
input_validation:
  enabled: true
  
  # 参数范围验证
  parameter_ranges:
    vehicle_mass:
      min: 500
      max: 5000
      unit: "kg"
      
    wheelbase:
      min: 2.0
      max: 5.0
      unit: "m"
      
    speed:
      min: 0
      max: 100
      unit: "m/s"
  
  # SQL注入防护
  sql_injection:
    enabled: true
    patterns:
      - "SELECT.*FROM"
      - "INSERT.*INTO"
      - "UPDATE.*SET"
      - "DELETE.*FROM"
      
  # XSS防护
  xss_protection:
    enabled: true
    sanitize_html: true
    allowed_tags: ["b", "i", "u", "strong", "em"]

## 错误处理
error_handling:
  # 错误信息脱敏
  hide_internal_errors: true
  
  # 自定义错误页面
  custom_error_pages:
    401: "/errors/401.html"
    403: "/errors/403.html"
    404: "/errors/404.html"
    500: "/errors/500.html"
  
  # 错误日志
  error_logging:
    enabled: true
    include_stack_trace: false  # 生产环境不包含堆栈
    log_level: "ERROR"

## 安全头配置
security_headers:
  # HTTP严格传输安全
  hsts:
    enabled: true
    max_age: 31536000  # 1年
    include_subdomains: true
    preload: true
    
  # 内容安全策略
  csp:
    enabled: true
    policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    
  # X-Frame-Options
  frame_options:
    enabled: true
    value: "DENY"
    
  # X-Content-Type-Options
  content_type_options:
    enabled: true
    value: "nosniff"
    
  # X-XSS-Protection
  xss_protection:
    enabled: true
    value: "1; mode=block"

## 会话管理
session:
  # 会话超时
  timeout_minutes: 30
  
  # 并发会话限制
  max_concurrent_sessions: 3
  
  # 会话存储
  storage: "redis"  # redis | memory | database
  redis:
    host: "${REDIS_HOST}"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    
  # Cookie安全
  cookie:
    secure: true      # 仅HTTPS
    http_only: true   # 防止XSS
    same_site: "strict"  # CSRF防护

## 依赖安全
dependency_security:
  # 依赖扫描
  scan_enabled: true
  scan_frequency: "daily"
  
  # 已知漏洞检查
  vulnerability_check:
    enabled: true
    fail_on_high: true
    fail_on_critical: true
    
  # 依赖更新
  auto_update:
    enabled: false  # 生产环境不自动更新
    notify_on_update: true

## 备份与恢复
backup:
  enabled: true
  frequency: "daily"
  retention_days: 30
  
  # 备份内容
  include:
    - "config/"
    - "data/"
    - "logs/"
  
  # 加密备份
  encryption:
    enabled: true
    algorithm: "AES-256"
    
  # 异地备份
  offsite:
    enabled: true
    destination: "s3://backup-bucket/vehicle-sim/"

## 监控与告警
security_monitoring:
  # 实时监控
  real_time:
    enabled: true
    alert_on:
      - "multiple_failed_logins"
      - "unusual_access_pattern"
      - "privilege_escalation"
      - "data_exfiltration"
      
  # 异常检测
  anomaly_detection:
    enabled: true
    sensitivity: "medium"  # low | medium | high
    
  # 告警通知
  alerts:
    email:
      enabled: true
      recipients:
        - "security@company.com"
        
    slack:
      enabled: true
      webhook: "${SLACK_WEBHOOK_URL}"
      
    pagerduty:
      enabled: true
      service_key: "${PAGERDUTY_SERVICE_KEY}"

## 合规性
compliance:
  # GDPR合规
  gdpr:
    enabled: true
    data_retention_days: 90
    right_to_deletion: true
    
  # SOC 2 Type II
  soc2:
    enabled: true
    audit_frequency: "annual"
    
  # ISO 27001
  iso27001:
    enabled: true
    last_audit: "2025-12-01"
    next_audit: "2026-12-01"

## 环境变量（示例）
# 请将以下环境变量设置为实际值：
# export JWT_SECRET_KEY="your-jwt-secret-key-here"
# export OAUTH_CLIENT_ID="your-oauth-client-id"
# export OAUTH_CLIENT_SECRET="your-oauth-client-secret"
# export API_KEY_PROD="your-production-api-key"
# export API_KEY_MONITORING="your-monitoring-api-key"
# export REDIS_HOST="redis.internal.company.com"
# export REDIS_PASSWORD="your-redis-password"
# export SLACK_WEBHOOK_URL="https://hooks.slack.com/services/..."
# export PAGERDUTY_SERVICE_KEY="your-pagerduty-key"
