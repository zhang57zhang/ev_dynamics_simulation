# 六自由度新能源车辆动力学仿真系统 - 项目配置

## 项目基本信息
project:
  name: "ev_dynamics_simulation"
  version: "0.1.0"
  description: "6-DOF Electric Vehicle Dynamics Simulation for HIL Testing"
  author: "Multi-Agent System"
  created: "2026-03-05"

## 技术栈决策（已确认）
technology_stack:
  programming_languages:
    primary: "Python 3.10+"
    performance_critical: "C++ 17"
    binding: "pybind11"
  
  realtime_system:
    os: "Linux"
    kernel_patch: "PREEMPT_RT"
    scheduler: "SCHED_FIFO"
    priority: 90
  
  communication:
    intra_module: "shared_memory"  # 模块内：共享内存
    inter_module: "message_queue"  # 模块间：消息队列
    protocol: "POSIX IPC"
  
  simulation_precision:
    default_frequency: 500  # Hz
    configurable_range: [500, 1000]  # Hz
    integration_method: "RK4"  # Runge-Kutta 4阶

## 开源参考（已确认）
reference_projects:
  architecture:
    - name: "CarSim"
      usage: "架构设计思路"
      license: "Commercial"
  
  modeling:
    - name: "OpenModelica"
      usage: "模型化思路"
      license: "OSMC"
    
    - name: "PyDy"
      usage: "数学模型实现"
      license: "BSD"
  
  implementation:
    approach: "自研实现"
    principle: "参考思路，不照搬代码"

## 质量要求
quality_requirements:
  documentation:
    architecture_doc: true
    api_doc: true
    user_guide: true
    deployment_guide: true
    code_comments: "comprehensive"  # 每行关键代码都有注释
  
  testing:
    unit_test: true
    integration_test: true
    realtime_test: true
    coverage_threshold: 90  # %
    independent_testing: true  # 独立严格测试
  
  performance:
    realtime_latency: 1  # ms（最大延迟）
    simulation_accuracy: 95  # %（与理论值对比）
    hil_readiness: true  # 可实际落地应用

## 系统架构（初步）
architecture:
  layers:
    - name: "Application Layer"
      components: ["HIL Interface", "User Interface", "Data Logger"]
    
    - name: "Simulation Engine Layer"
      components: ["Scheduler", "Coordinator", "State Manager"]
    
    - name: "Physics Model Layer"
      components:
        - "Vehicle Dynamics (6-DOF)"
        - "Powertrain System (Motor + Battery)"
        - "Chassis System (Suspension + Steering + Braking)"
        - "Tire Model (Pacejka)"
    
    - name: "Hardware Abstraction Layer"
      components: ["CAN Interface", "Ethernet Interface", "DA/AD Converter"]

## 核心模块设计（解耦）
modules:
  powertrain:
    description: "动力系统模块"
    submodules:
      - name: "Electric Motor"
        type: "PMSM"
        priority: "critical"
        language: "C++"
      
      - name: "Battery Pack"
        model: "SOC/SOH"
        priority: "critical"
        language: "C++"
      
      - name: "Transmission"
        type: "Single-Speed Reducer"
        priority: "normal"
        language: "C++"
    
    interface: "Python"
    communication: "shared_memory"
  
  chassis:
    description: "底盘系统模块"
    submodules:
      - name: "Suspension"
        type: "Active/Passive"
        priority: "critical"
        language: "C++"
      
      - name: "Steering"
        type: "EPS/SBW"
        priority: "critical"
        language: "C++"
      
      - name: "Braking"
        type: "EMB/Hydraulic"
        priority: "critical"
        language: "C++"
    
    interface: "Python"
    communication: "shared_memory"
  
  vehicle_dynamics:
    description: "车辆动力学模块"
    dof: 6
    coordinates:
      - "Longitudinal (X)"
      - "Lateral (Y)"
      - "Vertical (Z)"
      - "Roll (φ)"
      - "Pitch (θ)"
      - "Yaw (ψ)"
    
    priority: "critical"
    language: "C++"
    interface: "Python"
    communication: "shared_memory"
  
  tire_model:
    description: "轮胎模型模块"
    type: "Pacejka Magic Formula"
    features:
      - "Longitudinal Force"
      - "Lateral Force"
      - "Aligning Moment"
      - "Slip Ratio Calculation"
    
    priority: "critical"
    language: "C++"
    interface: "Python"
    communication: "shared_memory"
  
  realtime_scheduler:
    description: "实时调度模块"
    features:
      - "Periodic Task Scheduling"
      - "Priority Management"
      - "Deadline Monitoring"
      - "Resource Management"
    
    priority: "critical"
    language: "C++"
    interface: "Python"
    communication: "message_queue"
  
  hil_interface:
    description: "HIL接口模块"
    protocols:
      - "CAN Bus"
      - "Ethernet (UDP/TCP)"
      - "Analog I/O"
      - "Digital I/O"
    
    priority: "critical"
    language: "C++"
    interface: "Python"
    communication: "message_queue"

## 多Agent协作计划
agent_collaboration:
  phase_1:
    name: "Architecture Design"
    duration: 3  # days
    agent: "ArchitectAgent"
    deliverables:
      - "System Architecture Document"
      - "Module Interface Specification"
      - "Technical Design Document"
  
  phase_2:
    name: "Core Module Development"
    duration: 7  # days
    agents:
      - name: "BackendAgent"
        module: "Powertrain System"
      
      - name: "BackendAgent"
        module: "Chassis System"
      
      - name: "BackendAgent"
        module: "Vehicle Dynamics"
      
      - name: "AIEngineerAgent"
        module: "Tire Model"
      
      - name: "DevOpsAgent"
        module: "Realtime Scheduler"
    
    parallel: true  # 并行执行
  
  phase_3:
    name: "Integration Testing"
    duration: 3  # days
    agent: "TestAgent"
    deliverables:
      - "Unit Tests"
      - "Integration Tests"
      - "Realtime Tests"
      - "Test Report"
  
  phase_4:
    name: "Documentation"
    duration: 2  # days
    agent: "DocAgent"
    deliverables:
      - "Architecture Document"
      - "API Documentation"
      - "User Guide"
      - "Deployment Guide"
  
  phase_5:
    name: "Quality Evaluation"
    duration: 1  # day
    agent: "EvaluatorAgent"
    deliverables:
      - "Code Quality Report"
      - "Performance Evaluation"
      - "Feasibility Assessment"
      - "Quality Score"

